{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-warning text-dark">
            <h2 class="mb-0">Editar Publicación #{{ publicacion.id }}</h2>
        </div>
        <div class="card-body">
            <form action="{{ url_for('publicacion.edit', id=publicacion.id) }}" method="POST">
                
                <div class="mb-3">
                    <label for="titulo" class="form-label">Título:</label>
                    <input type="text" id="titulo" name="titulo" 
                           class="form-control" 
                           value="{{ publicacion.titulo }}" required>
                </div>

                <div class="mb-3">
                    <label for="contenido" class="form-label">Contenido:</label>
                    <textarea id="contenido" name="contenido" class="form-control" 
                              rows="6" required>{{ publicacion.contenido }}</textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary rounded-pill px-4">
                        Guardar Cambios
                    </button>
                    <a href="{{ url_for('publicacion.index') }}" class="btn btn-secondary rounded-pill px-4">
                        Cancelar
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>
{% endblock %}
