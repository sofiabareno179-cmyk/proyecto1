{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-primary text-white">
                    <h2 class="mb-0 h4">Editar Etiqueta #{{ etiqueta.id }}</h2>
                </div>
                <div class="card-body p-4">
                    <form action="{{ url_for('etiqueta.edit', id=etiqueta.id) }}" method="POST">
                        
                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-bold">Nombre:</label>
                            <input type="text" id="nombre" name="nombre" 
                                   class="form-control" 
                                   value="{{ etiqueta.nombre }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="slug" class="form-label fw-bold">Slug:</label>
                            <textarea id="slug" name="slug" class="form-control" 
                                      rows="8" required>{{ etiqueta.slug }}</textarea>
                            <small class="text-muted">Modifica su etiqueta aquí.</small>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary rounded-pill px-4">
                                Actualizar Etiqueta
                            </button>
                            <a href="{{ url_for('etiqueta.index') }}" class="btn btn-secondary rounded-pill px-4">
                                Cancelar
                            </a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
